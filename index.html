<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Explainers</title>
  <style>
    :root { --bg:#f4efe7; --paper:#fffdf9; --ink:#1f2937; --muted:#6b7280; --line:#ddd4c6; --accent:#8b5a33; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--ink); }
    main { width:min(860px, calc(100% - 32px)); margin:36px auto; background:var(--paper); border:1px solid var(--line); border-radius:18px; padding:28px; }
    h1 { margin:0 0 10px; font-size:2.2rem; }
    p { color:var(--muted); }
    ul { list-style:none; padding:0; margin:24px 0 0; display:grid; gap:12px; }
    li { display:flex; justify-content:space-between; gap:16px; align-items:center; border:1px solid var(--line); border-radius:12px; padding:14px 16px; background:white; }
    a { color:var(--accent); text-decoration:none; font-weight:700; }
    a:hover { text-decoration:underline; }
    span { color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  </style>
</head>
<body>
  <main>
    <h1>Explainers</h1>
    <p>Published standalone HTML explainers from this repository.</p>
    <p>GitHub Pages base URL: <a href="https://natustx.github.io/explainers/">https://natustx.github.io/explainers/</a></p>
    <ul>
      <li><a href="flue-vs-pi/">Flue vs Pi — Architecture Explainer</a><span>flue-vs-pi</span></li>
    </ul>
  </main>
</body>
</html>
